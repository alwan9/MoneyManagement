<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MoneyM Trading & Finance</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
  
  <!-- Ambient Decorative Background -->
  <div class="absolute -top-40 -left-40 w-96 h-96 bg-indigo-600/20 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-emerald-500/15 rounded-full blur-3xl pointer-events-none"></div>

  <!-- Absolute Top Right Theme Toggle -->
  <div class="absolute top-4 right-4 z-20">
    <button id="btn-theme-toggle" onclick="toggleTheme()" class="p-2.5 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 rounded-xl text-lg transition shadow-md flex items-center justify-center">
      <iconify-icon icon="lucide:moon" class="text-indigo-300"></iconify-icon>
    </button>
  </div>

  <div class="w-full max-w-md bg-zinc-900/90 backdrop-blur-xl border border-zinc-800/80 rounded-3xl p-8 shadow-2xl relative z-10">
    
    <!-- Logo & Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600/20 text-indigo-400 rounded-2xl mb-3 border border-indigo-500/30">
        <iconify-icon icon="lucide:wallet" class="text-3xl text-indigo-400"></iconify-icon>
      </div>
      <h1 class="text-2xl font-bold tracking-tight text-white">MoneyM Login</h1>
      <p class="text-zinc-400 text-xs mt-1">Manajemen Keuangan & Progress Trading PWA</p>
    </div>

    <!-- Form Login -->
    <form id="login-form" class="space-y-5">
      <div>
        <label class="block text-xs font-semibold text-zinc-300 uppercase tracking-wider mb-2">Username</label>
        <div class="relative">
          <input type="text" id="username" required placeholder="Masukkan username"
            class="w-full px-4 py-3 bg-zinc-950/80 border border-zinc-800 rounded-xl text-white placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition text-sm">
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold text-zinc-300 uppercase tracking-wider mb-2">Password</label>
        <div class="relative">
          <input type="password" id="password" autocomplete="new-password" required placeholder="••••••••"
            class="w-full pl-4 pr-11 py-3 bg-zinc-950/80 border border-zinc-800 rounded-xl text-white placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition text-sm">
          <button type="button" onclick="togglePasswordVisibility('password', 'eye-login')" class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-white p-1.5 transition">
            <iconify-icon id="eye-login" icon="lucide:eye" class="text-base"></iconify-icon>
          </button>
        </div>
      </div>

      <button type="submit" id="btn-submit"
        class="w-full py-3.5 px-4 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-xl shadow-lg shadow-indigo-600/30 transition transform active:scale-95 text-sm flex items-center justify-center gap-2">
        <span>Masuk Aplikasi</span>
        <iconify-icon icon="lucide:arrow-right" class="text-lg"></iconify-icon>
      </button>
    </form>


    <!-- PIN Quick Unlock Section (Bila PIN Diaktifkan) -->
    <div id="pin-section" class="hidden mt-6 pt-5 border-t border-zinc-800 text-center space-y-3">
      <p class="text-xs text-indigo-400 font-semibold flex items-center justify-center gap-1">
        <iconify-icon icon="lucide:fingerprint" class="text-base"></iconify-icon>
        <span>Login Cepat PIN 4-Digit</span>
      </p>
      <div class="flex justify-center gap-2 max-w-[200px] mx-auto">
        <input type="password" id="pin-input" maxlength="4" placeholder="••••"
          class="w-full text-center tracking-widest text-lg px-3 py-2 bg-zinc-950 border border-zinc-700 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
        <button type="button" onclick="unlockWithPin()" class="px-3 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-xs font-bold transition">
          Buka
        </button>
      </div>
    </div>

  </div>

  <script src="js/helper.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      checkAuthGuard();

      const pin = typeof getPin === 'function' ? getPin() : '';
      const cachedSession = localStorage.getItem('MONEYM_CACHE_SESSION');
      if (pin && cachedSession) {
        const pinSec = document.getElementById('pin-section');
        if (pinSec) pinSec.classList.remove('hidden');
      }
    });

    function unlockWithPin() {
      const enteredPin = document.getElementById('pin-input')?.value;
      const savedPin = getPin();
      const cachedSessionStr = localStorage.getItem('MONEYM_CACHE_SESSION');

      if (!enteredPin || enteredPin.length !== 4) {
        showToast('Masukkan 4 digit PIN.', 'warning');
        return;
      }

      if (enteredPin === savedPin && cachedSessionStr) {
        try {
          const sessionObj = JSON.parse(cachedSessionStr);
          saveSession(sessionObj);
          showToast('🔓 Berhasil terverifikasi via PIN 4-digit!', 'success');
          setTimeout(() => {
            window.location.href = './dashboard.html';
          }, 300);
        } catch (e) {
          showToast('Sesi cadangan tidak valid. Silakan login manual.', 'error');
        }
      } else {
        showToast('PIN 4-digit salah.', 'error');
      }
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      showLoading(true);
      const res = await apiCall('login', { username, password });
      showLoading(false);

      if (res.success) {
        if (res.data) {
          saveSession(res.data);
          localStorage.setItem('MONEYM_CACHE_SESSION', JSON.stringify(res.data));
        }
        showToast(res.message || 'Login berhasil!', 'success');
        setTimeout(() => {
          window.location.href = './dashboard.html';
        }, 400);
      } else {
        showToast(res.message || 'Username atau Password salah.', 'error');
      }
    });
  </script>
</body>
</html>
